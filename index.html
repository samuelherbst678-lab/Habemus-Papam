<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Konklave Tool Komplett</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f4f4f4;
}

/* KARTEN */
.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-bottom: 20px;
}

.card {
    width: 130px;
    background: white;
    border: 1px solid #aaa;
    position: relative;
}

.img {
    width: 100%;
    height: 110px;
    background: #ddd;
    background-size: cover;
}

.name {
    font-weight: bold;
    font-size: 13px;
}

.bar {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    background: #eee;
}

.badge {
    background: black;
    color: white;
    padding: 1px 4px;
}

.type {
    color: white;
    padding: 1px 4px;
}

.delete-btn {
    position: absolute;
    top: 2px;
    right: 3px;
    background: red;
    color: white;
    border: none;
    font-size: 10px;
}

/* TABELLE */
table {
    border-collapse: collapse;
    margin: auto;
    background: white;
}

th, td {
    border: 1px solid #aaa;
    padding: 6px;
}

input {
    width: 60px;
    text-align: center;
    border: none;
}

.gold {
    outline: 3px solid gold;
    background: #fff8dc;
}

.topbar {
    margin-bottom: 10px;
}

button {
    margin: 5px;
    padding: 6px 10px;
}
</style>
</head>

<body>

<h2>Kandidaten</h2>
<button onclick="addCard()">+ Kandidat</button>

<div class="container" id="cards"></div>

<h2>Wahlgänge</h2>

<div class="topbar">
    Wähler: <input id="total" type="number" value="120" oninput="updateThreshold()">
    → 2/3 = <span id="threshold">80</span>
</div>

<button onclick="addRound()">+ Wahlgang</button>

<table>
<thead>
<tr id="header">
    <th>WG</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>

<script>
const colors = {
 ERZ:"#002060", TRA:"#0050ff", KON:"#66b3ff",
 MOD:"#ffd700", REF:"#ff9999", LIB:"#ff3333", PRO:"#8b0000"
};

let candidates = [];
let rounds = 0;
let threshold = 80;

/* KARTEN */
function addCard() {
    const id = candidates.length;
    candidates.push("Kandidat");

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
    <button class="delete-btn" onclick="removeCard(${id}, this)">X</button>
    <div class="img" onclick="uploadImage(this)"></div>
    <div class="name" onclick="editName(this, ${id})">Kandidat</div>
    <div class="bar">
        <span class="badge">0</span>
        <span class="type" onclick="cycleType(this)">---</span>
    </div>
    `;

    document.getElementById("cards").appendChild(div);
    updateTable();
}

function removeCard(id, btn){
    candidates.splice(id,1);
    btn.parentElement.remove();
    rebuildTable();
}

function editName(el, id){
    const val = prompt("Name:", el.innerText);
    if(val){
        el.innerText = val;
        candidates[id] = val;
        updateHeader();
    }
}

function cycleType(el){
    const types = Object.keys(colors);
    let i = types.indexOf(el.innerText);
    i = (i+1)%types.length;
    el.innerText = types[i];
    el.style.background = colors[types[i]];
}

function uploadImage(div){
    const input = document.createElement("input");
    input.type="file";
    input.onchange = e=>{
        const r = new FileReader();
        r.onload = ev=>{
            div.style.backgroundImage=`url(${ev.target.result})`;
        };
        r.readAsDataURL(e.target.files[0]);
    };
    input.click();
}

/* TABELLE */
function updateHeader(){
    const header = document.getElementById("header");
    header.innerHTML = "<th>WG</th>";
    candidates.forEach(c=>{
        const th = document.createElement("th");
        th.innerText = c;
        header.appendChild(th);
    });
}

function addRound(){
    rounds++;
    const tr = document.createElement("tr");

    let row = `<td>WG ${rounds}</td>`;
    candidates.forEach(()=>{
        row += `<td><input type="number" value="0" oninput="checkMajority()"></td>`;
    });

    tr.innerHTML = row;
    document.getElementById("body").appendChild(tr);
}

function rebuildTable(){
    document.getElementById("body").innerHTML="";
    updateHeader();
    rounds=0;
}

function updateTable(){
    updateHeader();
}

function updateThreshold(){
    const total = Number(document.getElementById("total").value)||0;
    threshold = Math.ceil((2/3)*total);
    document.getElementById("threshold").innerText = threshold;
    checkMajority();
}

function checkMajority(){
    const rows = document.querySelectorAll("#body tr");

    rows.forEach(row=>{
        const inputs = row.querySelectorAll("input");
        inputs.forEach(i=>{
            i.classList.remove("gold");
            if(Number(i.value)>=threshold){
                i.classList.add("gold");
            }
        });
    });
}

/* START */
updateThreshold();
for(let i=0;i<3;i++) addCard();
</script>

</body>
</html>
